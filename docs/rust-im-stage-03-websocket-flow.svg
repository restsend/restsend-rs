<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="560" viewBox="0 0 1200 560" role="img" aria-labelledby="title desc">
  <title id="title">WebSocket realtime flow</title>
  <desc id="desc">Connection registration, heartbeat renewal, upstream processing and downstream delivery with backpressure control.</desc>
  <defs>
    <style>.bg{fill:#f8fafc}.box{fill:#fff;stroke:#1f2937;stroke-width:2;rx:10;ry:10}.hub{fill:#eef6ff;stroke:#1f2937;stroke-width:2;rx:10;ry:10}.db{fill:#e8f5e9;stroke:#1f2937;stroke-width:2;rx:10;ry:10}.warn{fill:#fff7ed;stroke:#1f2937;stroke-width:2;rx:10;ry:10}.title{font:700 28px Arial,sans-serif;fill:#111827}.h{font:700 17px Arial,sans-serif;fill:#111827}.t{font:14px Arial,sans-serif;fill:#111827}.s{font:12px Arial,sans-serif;fill:#374151}.a{stroke:#1f2937;stroke-width:2;fill:none;marker-end:url(#arrow)}.d{stroke:#6b7280;stroke-width:2;fill:none;stroke-dasharray:7 6;marker-end:url(#arrow2)}</style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#1f2937"/></marker><marker id="arrow2" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#6b7280"/></marker>
  </defs>
  <rect class="bg" width="1200" height="560"/><text class="title" x="40" y="48">阶段 3：WebSocket 实时链路，低延迟留在节点内</text>
  <rect class="box" x="60" y="115" width="180" height="80"/><text class="h" x="105" y="148">Client</text><text class="s" x="88" y="174">userId + device</text>
  <rect class="hub" x="320" y="95" width="220" height="120"/><text class="h" x="375" y="128">WS Gateway</text><text class="s" x="350" y="156">握手鉴权</text><text class="s" x="350" y="178">队列上限 / 速率限制</text>
  <rect class="hub" x="620" y="95" width="220" height="120"/><text class="h" x="695" y="128">WsHub</text><text class="s" x="650" y="156">本机连接表</text><text class="s" x="650" y="178">user -> device sessions</text>
  <rect class="db" x="920" y="95" width="220" height="120"/><text class="h" x="968" y="128">PresenceStore</text><text class="s" x="950" y="156">upsert session</text><text class="s" x="950" y="178">TTL heartbeat</text>

  <rect class="box" x="320" y="330" width="220" height="100"/><text class="h" x="372" y="365">上行处理</text><text class="s" x="350" y="392">chat / read / typing / ping</text><text class="s" x="350" y="414">交给业务服务或心跳续约</text>
  <rect class="box" x="620" y="330" width="220" height="100"/><text class="h" x="674" y="365">下行投递</text><text class="s" x="650" y="392">本节点直接写 channel</text><text class="s" x="650" y="414">慢消费者可剔除</text>
  <rect class="warn" x="920" y="330" width="220" height="100"/><text class="h" x="970" y="365">兜底原则</text><text class="s" x="950" y="392">推送不是唯一正确性来源</text><text class="s" x="950" y="414">重连后 REST 同步补齐</text>

  <path class="a" d="M240 155 L320 155"/><path class="a" d="M540 155 L620 155"/><path class="d" d="M840 155 L920 155"/>
  <path class="a" d="M430 215 L430 330"/><path class="a" d="M730 215 L730 330"/><path class="d" d="M1030 215 L1030 330"/>
</svg>
