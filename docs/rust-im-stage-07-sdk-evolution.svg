<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="580" viewBox="0 0 1200 580" role="img" aria-labelledby="title desc">
  <title id="title">SDK integration and evolution path</title>
  <desc id="desc">Rust core SDK bindings connect app, web and backend integrations, while Redis and MQ can be introduced later as accelerators.</desc>
  <defs><style>.bg{fill:#f8fafc}.box{fill:#fff;stroke:#1f2937;stroke-width:2;rx:10;ry:10}.core{fill:#eef6ff;stroke:#1f2937;stroke-width:2;rx:12;ry:12}.db{fill:#e8f5e9;stroke:#1f2937;stroke-width:2;rx:10;ry:10}.future{fill:#fff7ed;stroke:#1f2937;stroke-width:2;rx:10;ry:10}.title{font:700 28px Arial,sans-serif;fill:#111827}.h{font:700 17px Arial,sans-serif;fill:#111827}.t{font:14px Arial,sans-serif;fill:#111827}.s{font:12px Arial,sans-serif;fill:#374151}.a{stroke:#1f2937;stroke-width:2;fill:none;marker-end:url(#arrow)}.d{stroke:#6b7280;stroke-width:2;fill:none;stroke-dasharray:7 6;marker-end:url(#arrow2)}</style><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#1f2937"/></marker><marker id="arrow2" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#6b7280"/></marker></defs>
  <rect class="bg" width="1200" height="580"/><text class="title" x="40" y="48">阶段 7：SDK 与演进，把复杂状态机收进可复用内核</text>

  <rect class="core" x="410" y="105" width="380" height="145"/><text class="h" x="535" y="140">Rust Core SDK</text><text class="s" x="455" y="170">登录 / token / WebSocket / 心跳</text><text class="s" x="455" y="197">本地缓存 / 增量同步 / 冲突收敛</text><text class="s" x="455" y="224">统一协议语义，减少多端分叉</text>
  <rect class="box" x="80" y="120" width="220" height="100"/><text class="h" x="142" y="154">移动端</text><text class="s" x="120" y="184">iOS / Android binding</text>
  <rect class="box" x="900" y="120" width="220" height="100"/><text class="h" x="967" y="154">网页端</text><text class="s" x="940" y="184">WASM / JS package</text>
  <rect class="db" x="410" y="330" width="380" height="95"/><text class="h" x="535" y="364">当前真相源</text><text class="s" x="455" y="394">数据库承接消息、会话、presence</text>
  <rect class="future" x="80" y="455" width="300" height="70"/><text class="h" x="175" y="487">Redis</text><text class="s" x="125" y="510">热点路由缓存 / presence 加速</text>
  <rect class="future" x="820" y="455" width="300" height="70"/><text class="h" x="940" y="487">MQ</text><text class="s" x="865" y="510">高吞吐事件流 / 持久消费</text>

  <path class="a" d="M300 170 L410 170"/><path class="a" d="M790 170 L900 170"/><path class="a" d="M600 250 L600 330"/>
  <path class="d" d="M410 390 C305 420 270 430 230 455"/><path class="d" d="M790 390 C895 420 930 430 970 455"/>
  <text class="t" x="332" y="555">演进原则：先让数据库模型稳定，再把 Redis/MQ 作为加速层接入，而不是让它们成为早期强依赖。</text>
</svg>
