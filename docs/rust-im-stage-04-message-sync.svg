<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="780" viewBox="0 0 1400 780" role="img" aria-labelledby="title desc">
  <title id="title">IM message idempotency, ordering, recall and sync</title>
  <desc id="desc">Core IM message design: client msgId for idempotency, server topic sequence for ordering, durable storage before response, recall as a persisted state change, and sync convergence after notification failure.</desc>
  <defs>
    <style>
      .bg{fill:#f8fafc}.box{fill:#fff;stroke:#1f2937;stroke-width:2;rx:10;ry:10}.db{fill:#e8f5e9;stroke:#1f2937;stroke-width:2;rx:10;ry:10}.accent{fill:#eef6ff;stroke:#1f2937;stroke-width:2;rx:10;ry:10}.warn{fill:#fff7ed;stroke:#1f2937;stroke-width:2;rx:10;ry:10}.ok{fill:#ecfdf5;stroke:#1f2937;stroke-width:2;rx:10;ry:10}.title{font:700 28px Arial,sans-serif;fill:#111827}.h{font:700 17px Arial,sans-serif;fill:#111827}.t{font:14px Arial,sans-serif;fill:#111827}.s{font:12px Arial,sans-serif;fill:#374151}.a{stroke:#1f2937;stroke-width:2;fill:none;marker-end:url(#arrow)}.d{stroke:#6b7280;stroke-width:2;fill:none;stroke-dasharray:7 6;marker-end:url(#arrow2)}.thick{stroke:#111827;stroke-width:3;fill:none;marker-end:url(#arrow)}
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#1f2937"/></marker>
    <marker id="arrow2" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#6b7280"/></marker>
  </defs>

  <rect class="bg" width="1400" height="780"/>
  <text class="title" x="40" y="48">阶段 4：IM 的核心不是“实时推送”，而是幂等、顺序、可恢复</text>

  <rect class="box" x="45" y="95" width="220" height="120"/>
  <text class="h" x="88" y="128">客户端发送</text>
  <text class="s" x="72" y="156">生成 msgId/chatId</text>
  <text class="s" x="72" y="178">未收到 resp 可重传</text>
  <text class="s" x="72" y="200">重传必须复用同一 ID</text>

  <rect class="accent" x="315" y="95" width="220" height="120"/>
  <text class="h" x="368" y="128">幂等入口</text>
  <text class="s" x="342" y="156">chatId 识别同一意图</text>
  <text class="s" x="342" y="178">避免网络重试变重复消息</text>
  <text class="s" x="342" y="200">冲突时回已有结果/同步确认</text>

  <rect class="db" x="585" y="80" width="240" height="150"/>
  <text class="h" x="643" y="114">服务端分配 seq</text>
  <text class="s" x="612" y="144">topic.last_seq CAS + 1</text>
  <text class="s" x="612" y="166">只保证 topic 内顺序</text>
  <text class="s" x="612" y="188">createdAt 只做展示时间</text>
  <text class="s" x="612" y="210">客户端最终按 seq 收敛</text>

  <rect class="db" x="875" y="95" width="220" height="120"/>
  <text class="h" x="943" y="128">chat_logs</text>
  <text class="s" x="902" y="156">chatId + topicId + seq</text>
  <text class="s" x="902" y="178">content_json 持久化</text>
  <text class="s" x="902" y="200">消息主链不可丢</text>

  <rect class="ok" x="1145" y="95" width="210" height="120"/>
  <text class="h" x="1193" y="128">返回 resp</text>
  <text class="s" x="1172" y="156">只在落库成功后返回</text>
  <text class="s" x="1172" y="178">resp = 已被服务端接受</text>
  <text class="s" x="1172" y="200">不等于所有设备已收到</text>

  <rect class="warn" x="185" y="330" width="300" height="135"/>
  <text class="h" x="273" y="363">recall 撤回</text>
  <text class="s" x="212" y="392">校验 topic + chatId + senderId</text>
  <text class="s" x="212" y="414">原消息标记 recalled</text>
  <text class="s" x="212" y="436">追加 recall 事件消息并获得新 seq</text>

  <rect class="accent" x="555" y="330" width="300" height="135"/>
  <text class="h" x="642" y="363">事件发布</text>
  <text class="s" x="582" y="392">数据库变更后 publish</text>
  <text class="s" x="582" y="414">broadcast 解耦推送/webhook</text>
  <text class="s" x="582" y="436">下游失败不破坏消息事实</text>

  <rect class="warn" x="925" y="330" width="300" height="135"/>
  <text class="h" x="1010" y="363">实时通知</text>
  <text class="s" x="952" y="392">WebSocket / 节点间 HTTP</text>
  <text class="s" x="952" y="414">可以失败、超时、丢通知</text>
  <text class="s" x="952" y="436">不允许丢数据库消息</text>

  <rect class="box" x="315" y="585" width="240" height="115"/>
  <text class="h" x="382" y="618">客户端同步</text>
  <text class="s" x="342" y="646">lastSeq + limit</text>
  <text class="s" x="342" y="668">缺什么补什么</text>
  <text class="s" x="342" y="690">重连后最终一致</text>

  <rect class="db" x="635" y="570" width="260" height="145"/>
  <text class="h" x="710" y="604">顺序查询</text>
  <text class="s" x="662" y="632">where topic_id = ?</text>
  <text class="s" x="662" y="654">and seq &gt; lastSeq</text>
  <text class="s" x="662" y="676">order by seq asc</text>
  <text class="s" x="662" y="698">过滤 startSeq / deleted_by</text>

  <rect class="ok" x="975" y="585" width="240" height="115"/>
  <text class="h" x="1040" y="618">最终收敛</text>
  <text class="s" x="1002" y="646">按 seq 排序</text>
  <text class="s" x="1002" y="668">recall 状态可同步</text>
  <text class="s" x="1002" y="690">多端视图一致</text>

  <path class="thick" d="M265 155 L315 155"/>
  <path class="thick" d="M535 155 L585 155"/>
  <path class="thick" d="M825 155 L875 155"/>
  <path class="thick" d="M1095 155 L1145 155"/>

  <path class="a" d="M985 215 C950 285 640 285 485 375"/>
  <path class="a" d="M485 398 L555 398"/>
  <path class="a" d="M855 398 L925 398"/>

  <path class="d" d="M1075 465 C1055 535 880 545 765 570"/>
  <path class="a" d="M635 642 L555 642"/>
  <path class="a" d="M895 642 L975 642"/>

  <text class="s" x="642" y="520">通知失败不会改变事实：消息已经在 chat_logs，客户端靠 sync 修复</text>
</svg>
